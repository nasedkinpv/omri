name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-26
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        # AppIcon.icon (Icon Composer 2) fails actool < 26.6; no Xcode 27 on hosted runners yet
        xcode-version: latest
        
    - name: Build
      run: |
        xcodebuild build \
          -project Omri.xcodeproj \
          -scheme Omri \
          -configuration Release \
          -destination 'platform=macOS,arch=arm64' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO